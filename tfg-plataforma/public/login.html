<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Plataforma Inteligente Universitaria</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="login-body">


<!-- NAVBAR -->
<nav>
  <div class="logo">
    <a href="index.html" class="no-hover">
      <img src="images/icon.png" alt="Logo">
      <h1>TFG Plataforma</h1>
    </a>
  </div>
  <ul>
    <li><a href="index.html">Volver a Inicio</a></li>
  </ul>
</nav>

<div class="login-container">
  <h2>Plataforma Inteligente Universitaria</h2>

<form id="loginForm" autocomplete="off" novalidate>
  <!-- campo "falso" para engañar al autocompletado -->
  <input type="text" name="fakeusernameremembered" style="display:none">
  <input type="password" name="fakepasswordremembered" style="display:none">

  <!-- inputs reales con nombres únicos -->
  <input type="text" id="username" name="username_real" placeholder="Usuario" autocomplete="new-username" required>
  <input type="password" id="password" name="password_real" placeholder="Contraseña" autocomplete="new-password" required>
  <button type="submit">Iniciar sesión</button>
</form>

<script>
const form = document.getElementById("loginForm");

const returnUrl = (document.referrer && new URL(document.referrer).origin === window.location.origin)
  ? document.referrer
  : "/index.html";

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("Introduce usuario y contraseña");
    return;
  }

  const res = await fetch("/api/v1/auth/login", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ username, password })
  });

  if (res.ok) {
    window.location.href = returnUrl;
  } else {
    const data = await res.json();
    alert(data.error || "Credenciales incorrectas");
  }
});
</script>

</body>
</html>
