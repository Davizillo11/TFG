<!DOCTYPE html>
<html>

<head>
<title>Aulas</title>
<link rel="stylesheet" href="css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="overlay">

<!-- NAVBAR -->
<nav>
  <div class="logo">
    <a href="index.html" class="no-hover">
      <img src="images/icon.png" alt="Logo">
      <h1>TFG Plataforma</h1>
    </a>
  </div>
  <ul>
    <li><a href="index.html">Inicio</a></li>
    <li><a href="horarios.html">Horarios</a></li>
    <li><a href="aulas.html">Aulas</a></li>
    <li><a href="generador.html">Generador</a></li>
    <li id="login-li"><a class="btn-login" href="login.html">Iniciar sesión</a></li>
  </ul>
</nav>

<div class="container">

<h2>Aulas disponibles</h2>

<table>

<tr>
<th>Aula</th>
<th>Capacidad</th>
</tr>

<tr>
<td>Aula 101</td>
<td>60</td>
</tr>

<tr>
<td>Aula 202</td>
<td>120</td>
</tr>

</table>

</div>

</div>

<script>
const loginLi = document.getElementById("login-li");
const usuario = localStorage.getItem("usuario");

if(usuario){
  loginLi.innerHTML = `
    <div class="user-dropdown">
      <span id="user-btn">Hola, ${usuario}</span>
      <div class="user-dropdown-content">
        <a href="#" id="logout-btn">Cerrar sesión</a>
      </div>
    </div>
  `;
  document.getElementById("user-btn").addEventListener("click", () => {
    loginLi.querySelector(".user-dropdown").classList.toggle("active");
  });
  document.getElementById("logout-btn").addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.removeItem("usuario");
    window.location.reload();
  });
}
</script>

</body>
</html>
